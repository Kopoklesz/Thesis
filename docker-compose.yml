services:
  pannonshop-db:
    image: postgres:16
    container_name: pannonshop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pannonshop-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - pannonshop-network

  pannonshop-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pannonshop-backend
    restart: unless-stopped
    depends_on:
      - pannonshop-db
    environment:
      DB_HOST: pannonshop-db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    ports:
      - "8091:3001"
    networks:
      - pannonshop-network

  pannonshop-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: pannonshop-frontend
    restart: unless-stopped
    depends_on:
      - pannonshop-backend
    ports:
      - "8092:80"
    networks:
      - pannonshop-network

volumes:
  pannonshop-db-data:

networks:
  pannonshop-network:
    driver: bridge
